# ============================================================================
# Zhanshi Research Daily — 配置文件
# ============================================================================
# 复制此文件为 config.yaml 并按需修改。所有配置项都有默认值，最小配置只需改 categories。
# cp config.example.yaml config.yaml
# ============================================================================

# --------------------------------------------------------------------------
# 追踪的 arXiv 类别
# --------------------------------------------------------------------------
# arXiv 类别列表: https://arxiv.org/category_taxonomy
# 当前默认配置偏向医学影像、眼科 AI、Agent、CV、持续学习：
categories:
  - cs.CV   # Computer Vision — 计算机视觉
  - cs.CL   # Computation and Language — 计算语言学（NLP、LLM、文本生成等）
  - cs.AI   # Artificial Intelligence — 人工智能（通用 AI、搜索、知识表示等）
  - cs.LG   # Machine Learning — 机器学习（深度学习、优化、理论等）
  - cs.MM   # Multimedia — 多媒体（跨模态、图文检索等）
  - cs.IR   # Information Retrieval — 信息检索（搜索引擎、RAG、推荐等）
  - eess.IV # Image and Video Processing — 图像视频处理
  # - cs.RO   # 如果重新加强具身方向可开启
  # 更多类别示例（取消注释即可启用）:
  # - cs.CR   # Cryptography and Security — 密码学与安全
  # - cs.DB   # Databases — 数据库
  # - cs.DC   # Distributed Computing — 分布式计算
  # - cs.SE   # Software Engineering — 软件工程
  # - stat.ML # Machine Learning (Statistics) — 机器学习（统计方向）
  # - eess.IV # Image and Video Processing — 图像视频处理
  # - math.OC # Optimization and Control — 优化与控制
  # - q-bio.BM # Biomolecular Structure — 生物分子

# --------------------------------------------------------------------------
