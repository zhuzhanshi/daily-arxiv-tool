# ============================================================================
# Daily arXiv Tool — 配置文件
# ============================================================================
# 复制此文件为 config.yaml 并按需修改。所有配置项都有默认值，最小配置只需改 categories。
# cp config.example.yaml config.yaml
# ============================================================================

# --------------------------------------------------------------------------
# 追踪的 arXiv 类别
# --------------------------------------------------------------------------
# arXiv 类别列表: https://arxiv.org/category_taxonomy
# 常见 AI 相关类别:
categories:
  - cs.CV   # Computer Vision — 计算机视觉（图像识别、目标检测、图像生成等）
  - cs.CL   # Computation and Language — 计算语言学（NLP、LLM、文本生成等）
  - cs.AI   # Artificial Intelligence — 人工智能（通用 AI、搜索、知识表示等）
  - cs.LG   # Machine Learning — 机器学习（深度学习、优化、理论等）
  - cs.MM   # Multimedia — 多媒体（跨模态、图文检索等）
  - cs.IR   # Information Retrieval — 信息检索（搜索引擎、RAG、推荐等）
  - cs.RO   # Robotics — 机器人学（运动规划、具身智能等）
  # 更多类别示例（取消注释即可启用）:
  # - cs.CR   # Cryptography and Security — 密码学与安全
  # - cs.DB   # Databases — 数据库
  # - cs.DC   # Distributed Computing — 分布式计算
  # - cs.SE   # Software Engineering — 软件工程
  # - stat.ML # Machine Learning (Statistics) — 机器学习（统计方向）
  # - eess.IV # Image and Video Processing — 图像视频处理
  # - math.OC # Optimization and Control — 优化与控制
  # - q-bio.BM # Biomolecular Structure — 生物分子

# --------------------------------------------------------------------------
# 领域分类规则
# --------------------------------------------------------------------------
# 系统内置 28 个 AI 子领域分类规则（涵盖 CV/NLP/LLM/多模态等），开箱即用。
# 如果你研究 AI，大概率不需要改这部分。
#
# 如果你想自定义（比如研究其他学科），可以覆盖或新增领域:
# domains:
#   quantum_computing:               # 领域 ID（英文下划线）
#     name: "量子计算"                # 显示名称
#     emoji: "⚛️"                    # Emoji 图标
#     keywords:                       # 匹配关键词（不区分大小写，匹配标题+摘要）
#       - "quantum comput"
#       - "quantum circuit"
#       - "qubit"
#       - "quantum advantage"
#     priority: 5                     # 优先级（数字越小越优先匹配，默认 50）
#
#   bioinformatics:
#     name: "生物信息学"
#     emoji: "🧬"
#     keywords:
#       - "genome"
#       - "protein folding"
#       - "sequence alignment"
#       - "gene expression"

# --------------------------------------------------------------------------
# 筛选与评分配置
# --------------------------------------------------------------------------
filter:
  # 关注的领域（留空 = 保留所有领域）
  # 只有这些领域的论文才会进入评分筛选，其余丢弃
  focus_domains:
    - multimodal_vlm       # 多模态/VLM
    - llm_reasoning        # LLM 推理
    - llm_agent            # LLM Agent
    - llm_efficiency       # LLM 效率
    - llm_alignment        # LLM 对齐/RLHF
    - llm_nlp              # LLM/NLP 通用
    - image_generation     # 图像生成/扩散模型
    - video_understanding  # 视频理解/生成
    - 3d_vision            # 3D 视觉
    - model_compression    # 模型压缩/量化/蒸馏
    - self_supervised      # 自监督学习
    - nlp_understanding    # NLP 理解（NER/QA/分类）
    - nlp_generation       # NLP 生成（摘要/翻译/对话）
    - robotics             # 机器人/具身智能
    - ai_safety            # AI 安全

  # A 档数量（深度笔记：读全文，写 100+ 行笔记）
  top_a: 20
  # B 档数量（轻量笔记：只读摘要，写 50 行方法概要）
  top_b: 40

  # --------------------------------------------------------------------------
  # 团队/机构加分
  # --------------------------------------------------------------------------
  # 作者名中出现以下关键词时加分（每命中 +5，上限 15）
  # 注意: arXiv API 只返回作者名，不返回机构信息，所以匹配不完美
  teams:
    # 工业界
    - "google"
    - "deepmind"
    - "openai"
    - "meta"
    - "fair"
    - "microsoft"
    - "nvidia"
    - "apple"
    - "anthropic"
    # 中国科技公司
    - "tencent"
    - "alibaba"
    - "baidu"
    - "bytedance"
    # 高校
    - "tsinghua"
    - "peking"
    - "stanford"
    - "mit"
    - "berkeley"
    - "cmu"
    - "princeton"
    - "harvard"
    - "oxford"
    - "cambridge"
    - "eth zurich"
    - "epfl"
    - "kaist"
    - "seoul national"
    - "tokyo"

  # --------------------------------------------------------------------------
  # 高价值关键词
  # --------------------------------------------------------------------------
  # 摘要中出现以下词加分（每命中 +3，上限 30）
  high_value_keywords:
    # 方法创新信号
    - "state-of-the-art"
    - "sota"
    - "novel framework"
    - "first to"
    - "we propose"
    - "we introduce"
    - "new paradigm"
    - "unified"
    - "surpass"
    - "outperform"
    # 热门主题
    - "scaling law"
    - "emergent"
    - "chain-of-thought"
    - "in-context"
    - "instruction tuning"
    - "rlhf"
    - "direct preference"
    - "world model"
    - "test-time"
    - "inference-time"
    - "long context"
    - "mixture of expert"
    - "moe"
    - "multimodal"
    - "vision-language"
    - "video generation"
    - "diffusion"
    - "flow matching"
    - "autoregressive"
    - "benchmark"
    - "evaluation"
    # 实用性信号
    - "open-source"
    - "code available"
    - "publicly available"

  # 低价值关键词（命中 -10）
  low_value_signals:
    - "survey of"
    - "review of"
    - "a survey"
    - "position paper"
    - "workshop"
    - "dataset only"
    - "annotation tool"

# --------------------------------------------------------------------------
# 网络配置
# --------------------------------------------------------------------------
network:
  # HTTP/HTTPS 代理（留空 = 直连，无需代理）
  # 示例: "http://127.0.0.1:7890" 或 "socks5://127.0.0.1:1080"
  proxy: "http://127.0.0.1:7890"

  # 是否验证 SSL 证书（使用某些代理时需设为 false）
  ssl_verify: false

  # arXiv API 请求间隔（秒）— arXiv 要求 crawl-delay ≥ 3 秒
  request_interval: 3.5

  # 下载论文全文的请求间隔（秒）— arXiv robots.txt 要求 crawl-delay: 5
  download_interval: 5.0

  # 下载并发线程数
  download_workers: 3

# --------------------------------------------------------------------------
# 输出配置
# --------------------------------------------------------------------------
output:
  # mkdocs 文档目录（自动生成的页面放这里）
  docs_dir: "notes"

  # 原始数据/日志目录
  logs_dir: "logs"

  # 论文全文缓存目录
  cache_dir: "paper_cache"

  # 站点名称（显示在 mkdocs 页面标题）
  site_name: "Daily arXiv"

  # 站点 URL（用于 mkdocs 部署）
  site_url: "https://yourusername.github.io/daily-arxiv/"

  # GitHub 仓库地址（可选，显示在页面右上角）
  repo_url: ""
