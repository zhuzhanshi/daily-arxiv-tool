# --------------------------------------------------------------------------
# 筛选与评分配置
# --------------------------------------------------------------------------
filter:
  # 关注的领域（留空 = 保留所有领域）
  # 这版默认更强调医学影像、眼科AI、Agent、CV、持续学习。
  focus_domains:
    - ophthalmic_clinical  # 眼科AI临床任务
    - ophthalmic_methods   # 眼科AI方法任务
    - medical_imaging      # 医学影像
    - continual_learning   # 持续学习
    - agent_systems        # 医学影像Agent
    - computer_vision_core # 计算机视觉
    - segmentation         # 图像分割
    - object_detection     # 目标检测
    - multimodal_vlm       # 多模态/VLM
    - llm_agent            # LLM Agent

  # 领域权重（0-20 左右）。数字越大，越容易进入 A 档。
  domain_weights:
    ophthalmic_clinical: 19
    ophthalmic_methods: 16
    medical_imaging: 17
    continual_learning: 16
    agent_systems: 16
    computer_vision_core: 15
    segmentation: 15
    object_detection: 14
    multimodal_vlm: 13
    llm_agent: 13

  # A 档数量（深度笔记：读全文，写 100+ 行笔记）
  # 默认缩小到可持续精读的规模。
  top_a: 10
  # B 档数量（轻量笔记：只读摘要，写方法概要）
  top_b: 24

  # --------------------------------------------------------------------------
  # 团队/机构加分
  # --------------------------------------------------------------------------
  # 作者名中出现以下关键词时加分（每命中 +5，上限 15）
  # 注意: arXiv API 只返回作者名，不返回机构信息，所以匹配不完美
  teams:
    # 工业界
    - "google"
    - "deepmind"
    - "openai"
    - "meta"
    - "fair"
    - "microsoft"
    - "nvidia"
    - "apple"
    - "anthropic"
    # 中国科技公司
    - "tencent"
    - "alibaba"
    - "baidu"
    - "bytedance"
    # 高校
    - "tsinghua"
    - "peking"
    - "stanford"
    - "mit"
    - "berkeley"
    - "cmu"
    - "princeton"
    - "harvard"
    - "oxford"
    - "cambridge"
    - "eth zurich"
    - "epfl"
    - "kaist"
    - "seoul national"
    - "tokyo"
    # 医疗 / 视觉 / 眼科相关团队
    - "stanford medicine"
    - "mass general"
    - "mayo"
    - "johns hopkins"
    - "ucl"
    - "monash"
    - "sydney"
    - "fudan"
    - "sjtu"
    - "zhejiang"
    - "sun yat-sen"
    - "wills eye"
    - "moorfields"
    - "nih"

  # --------------------------------------------------------------------------
  # 高价值关键词
  # --------------------------------------------------------------------------
  # 摘要中出现以下词加分（每命中 +3，上限 30）
  high_value_keywords:
    # 方法创新信号
    - "state-of-the-art"
    - "sota"
    - "novel framework"
    - "first to"
    - "we propose"
    - "we introduce"
    - "new paradigm"
    - "unified"
    - "surpass"
    - "outperform"
    # 热门主题
    - "scaling law"
    - "emergent"
    - "chain-of-thought"
    - "tool use"
    - "agentic"
    - "planning"
    # 医学影像 / 眼科AI / 持续学习信号
    - "medical image"
    - "medical imaging"
    - "clinical"
    - "fundus"
    - "retina"
    - "retinal"
    - "oct"
    - "octa"
    - "ophthalm"
    - "glaucoma"
    - "diabetic retinopathy"
    - "myopia"
    - "cataract"
    - "dme"
    - "screening"
    - "grading"
    - "diagnosis"
    - "triage"
    - "clinical workflow"
    - "referral"
    - "prognosis"
    - "report generation"
    - "lesion"
    - "multi-center"
    - "external validation"
    - "prospective"
    - "cross-device"
    - "domain generalization"
    - "domain adaptation"
    - "continual learning"
    - "lifelong learning"
    - "catastrophic forgetting"
    - "incremental learning"
    - "class-incremental"
    # CV 通用高价值信号
    - "multimodal"
    - "vision-language"
    - "segmentation"
    - "detection"
    - "representation learning"
    - "foundation model"
    - "generalization"
    - "robustness"
    - "benchmark"
    - "evaluation"
    # 实用性信号
    - "open-source"
    - "code available"
    - "publicly available"

  # 低价值关键词（命中 -10）
  low_value_signals:
    - "survey of"
    - "review of"
    - "a survey"
    - "position paper"
    - "workshop"
    - "dataset only"
    - "annotation tool"
    - "leaderboard"
    - "competition"
    - "survey"
    - "review"

# --------------------------------------------------------------------------
# 网络配置
# --------------------------------------------------------------------------
network:
  # HTTP/HTTPS 代理（留空 = 直连，无需代理）
  # 示例: "http://127.0.0.1:1082" 或 "socks5://127.0.0.1:1080"
  proxy: ""

  # 是否验证 SSL 证书（使用某些代理时需设为 false）
  ssl_verify: false

  # arXiv API 请求间隔（秒）— arXiv 要求 crawl-delay ≥ 3 秒
  request_interval: 3.5

  # 下载论文全文的请求间隔（秒）— arXiv robots.txt 要求 crawl-delay: 5
  download_interval: 5.0

  # 下载并发线程数
  download_workers: 3

# --------------------------------------------------------------------------
# 输出配置
# --------------------------------------------------------------------------
output:
  # mkdocs 文档目录（自动生成的页面放这里）
  docs_dir: "notes"

  # 原始数据/日志目录
  logs_dir: "logs"

  # 论文全文缓存目录
  cache_dir: "paper_cache"

  # 站点名称（显示在 mkdocs 页面标题）
  site_name: "Zhanshi Research Board"

  # 站点 URL（用于 mkdocs 部署）
  site_url: "https://zhuzhanshi.github.io/daily-arxiv-tool/"

  # GitHub 仓库地址（可选，显示在页面右上角）
  repo_url: "https://github.com/zhuzhanshi/daily-arxiv-tool"
