name: Daily arXiv
on:
  schedule:
    # UTC 10:00 = 北京时间 18:00
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD)，留空 = 昨天'
        required: false
      days:
        description: '获取过去 N 天'
        required: false
        default: '1'

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install -r requirements.txt

      - name: Fetch & Filter & Generate
        run: |
          cd src
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python cli.py run "${{ github.event.inputs.date }}"
          else
            python cli.py run --days ${{ github.event.inputs.days || '1' }}
          fi

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "daily: $(date -u +%Y-%m-%d)"
          file_pattern: "notes/ logs/"
